# ─────────────────────────────────────────────────────────────────────────────
# Geo Embedder — Docker Compose
#
# Сервисы:
#   pipeline  — запуск скриптов 01–05 (подготовка данных + обучение)
#   serve     — FastAPI сервер эмбеддера для Open WebUI
#   jupyter   — опциональный Jupyter для экспериментов
#
# Тома:
#   ./raw_docs     → /data/raw_docs    (входные документы, read-only)
#   ./data         → /data/processed   (чанки, пары, триплеты)
#   ./models       → /models           (HF-кэш + дообученные модели)
#   ./output       → /output           (результаты оценки)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Пайплайн: подготовка данных + обучение ──────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: geo-embedder:latest
    container_name: geo_pipeline
    runtime: nvidia                      # убрать если нет GPU
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0           # выбрать нужную карту
      - OPENAI_API_KEY=${OPENAI_API_KEY} # из .env файла
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface
      - PYTHONPATH=/app
    volumes:
      - ./raw_docs:/data/raw_docs:ro     # исходные PDF/DOCX (только чтение)
      - ./data:/data/processed           # обработанные данные
      - ./models:/models                 # кэш моделей + сохранённые веса
      - ./output:/output                 # результаты экспериментов
      - ./scripts:/app/scripts           # код (монтируем для hot-reload при разработке)
      - ./training:/app/training
    working_dir: /app
    command: tail -f /dev/null
    shm_size: "16gb"                     # нужен для DataLoader с num_workers>0
    ulimits:
      memlock: -1
      stack: 67108864
    restart: unless-stopped

